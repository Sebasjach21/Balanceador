global
    daemon

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

resolvers dns
    nameserver google 8.8.8.8:53
    hold valid 10s

frontend http_front
    bind *:80
    default_backend render_backends

backend render_backends
    balance roundrobin
    option httpchk
    http-check send meth GET uri / hdr Host techstore-balanceador.onrender.com
    http-check expect string "success"
    server techstore-api-1-5grr.onrender.com techstore-api-1-5grr.onrender.com:443 ssl verify none sni str(techstore-api-1-5grr.onrender.com) check check-sni techstore-api-1-5grr.onrender.com fall 3 rise 2 resolvers dns
    server proyectoad2.onrender.com proyectoad2.onrender.com:443 ssl verify none sni str(proyectoad2.onrender.com) check check-sni proyectoad2.onrender.com fall 3 rise 2 backup resolvers dns
