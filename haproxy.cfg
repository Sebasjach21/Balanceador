global
    daemon

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

resolvers dns
    nameserver google 8.8.8.8:53
    hold valid 10s

frontend http_front
    bind *:80
    default_backend render_backends

backend render_backends
    balance roundrobin
    option httpchk GET /productos
    http-check expect string "success"
    server api1 techstore-api-1-5grr.onrender.com:443 ssl verify none sni "techstore-api-1-5grr.onrender.com" check fall 3 rise 2 resolvers dns
    server api2 proyectoad2.onrender.com:443 ssl verify none sni "proyectoad2.onrender.com" check fall 3 rise 2 backup resolvers dns
