events {
    worker_connections 1024;
}

http {
    upstream backend {
        # Servidor principal (activo)
        server techstore-api-1-5grr.onrender.com max_fails=3 fail_timeout=30s;
        # Servidor de respaldo (backup)
        server proyectoad2.onrender.com max_fails=3 fail_timeout=30s backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
