events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 valid=30s;

    upstream backend {
        server techstore-api-1-5grr.onrender.com:443 max_fails=3 fail_timeout=30s;
        server proyectoad2.onrender.com:443 max_fails=3 fail_timeout=30s backup;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass https://backend;
            proxy_set_header Host techstore-api-1-5grr.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name techstore-api-1-5grr.onrender.com;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_verify off;
            proxy_redirect off;
            
            # === NUEVO: detectar respuestas que contengan "suspended" y tratarlas como error ===
            proxy_intercept_errors on;
            error_page 200 = @fallback;
        }
    }

    # Si la respuesta del principal contiene "suspended", se redirige al backup
    location @fallback {
        internal;
        proxy_pass https://proyectoad2.onrender.com;
        proxy_set_header Host proyectoad2.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_name proyectoad2.onrender.com;
        proxy_ssl_verify off;
    }
}