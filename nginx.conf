events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 valid=30s;

    upstream backend {
        # Servidor principal (activo) - puerto HTTPS 443
        server techstore-api-1-5grr.onrender.com:443 max_fails=3 fail_timeout=30s;
        # Servidor de respaldo (backup) - puerto HTTPS 443
        server proyectoad2.onrender.com:443 max_fails=3 fail_timeout=30s backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass https://backend;

            # SSL hacia los backends de Render
            proxy_ssl_server_name on;
            proxy_ssl_verify     off;   # Render usa certs validos, pero upstream no requiere verificacion

            # Cabeceras correctas
            proxy_set_header Host              techstore-api-1-5grr.onrender.com;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_redirect off;
        }
    }
}
